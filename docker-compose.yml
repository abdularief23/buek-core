services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-buek}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-buek}
      POSTGRES_DB: ${POSTGRES_DB:-buek_core}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-buek} -d ${POSTGRES_DB:-buek_core}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_PORT: 4000
      CORS_ORIGIN: ${CORS_ORIGIN:-https://core.buekwebsite.com}
      DATABASE_URL: postgresql://${POSTGRES_USER:-buek}:${POSTGRES_PASSWORD:-buek}@postgres:5432/${POSTGRES_DB:-buek_core}?schema=public
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      BUEK_DOMAIN_MODULES: ${BUEK_DOMAIN_MODULES:-@buek/domain-manufacturing}
    ports:
      - "${API_HOST_PORT:-4000}:4000"

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-5173}:80"

volumes:
  postgres-data:
