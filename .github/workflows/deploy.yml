name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        run: |
          missing=0
          for key in VPS_HOST VPS_USER SSH_PRIVATE_KEY; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing GitHub secret: ${key}"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo ""
            echo "Auto-deploy cannot run without SSH secrets."
            echo "Deploy manually on VPS: ./scripts/console-recover.sh"
            exit 1
          fi
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail
            if [ -d "$HOME/buek-core" ]; then
              cd "$HOME/buek-core"
            elif [ -d "/root/buek-core" ]; then
              cd "/root/buek-core"
            elif [ -d "/var/www/buek-core" ]; then
              cd "/var/www/buek-core"
            else
              cd "$HOME"
              git clone https://github.com/abdularief23/buek-core.git
              cd buek-core
            fi
            chmod +x scripts/*.sh
            ./scripts/console-recover.sh

  verify:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify live deployment
        run: |
          chmod +x scripts/verify-deploy.sh
          ./scripts/verify-deploy.sh https://core.buekwebsite.com
