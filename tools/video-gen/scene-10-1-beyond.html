<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Scene 10.1 — Beyond Manufacturing</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1920px; height: 1080px; overflow: hidden;
      background: #020617;
      font-family: Inter, "SF Pro Display", system-ui, sans-serif;
      color: #f8fafc;
    }
    .stage {
      position: relative; width: 100%; height: 100%;
      animation: orbitZoom 5s ease-in-out forwards;
    }
    @keyframes orbitZoom {
      0% { transform: scale(1.2) rotate(0deg); }
      70% { transform: scale(1) rotate(3deg); }
      100% { transform: scale(0.95) rotate(0deg); }
    }
    .bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 50%, rgba(13, 79, 240, 0.2) 0%, transparent 65%),
        #020617;
    }
    .orbit-wrap {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .orbit {
      position: relative; width: 900px; height: 900px;
      animation: slowOrbit 5s linear infinite;
    }
    @keyframes slowOrbit {
      from { transform: rotate(0deg); }
      to { transform: rotate(15deg); }
    }
    .core {
      position: absolute; left: 50%; top: 50%;
      transform: translate(-50%, -50%); z-index: 10;
      text-align: center;
      padding: 28px 44px; border-radius: 20px;
      background: linear-gradient(135deg, #0d4ff0, #7a2af7);
      box-shadow: 0 0 60px rgba(13, 79, 240, 0.55);
      opacity: 0; animation: coreIn 0.6s ease-out 0.3s forwards;
    }
    @keyframes coreIn { to { opacity: 1; } }
    .core .t1 { font-size: 32px; font-weight: 900; letter-spacing: 2px; }
    .core .t2 { font-size: 14px; font-weight: 600; letter-spacing: 4px; color: #bfdbfe; margin-top: 4px; }
    .domain {
      position: absolute; padding: 14px 20px; border-radius: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(56, 189, 248, 0.35);
      font-size: 15px; font-weight: 700; white-space: nowrap;
      opacity: 0; transform: scale(0.8);
      animation: domIn 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      box-shadow: 0 0 24px rgba(56, 189, 248, 0.12);
    }
    .d1 { top: 50%; left: 50%; margin: -20px 0 0 -400px; animation-delay: 0.6s; }
    .d2 { top: 50%; left: 50%; margin: -130px 0 0 -340px; animation-delay: 0.8s; }
    .d3 { top: 50%; left: 50%; margin: -240px 0 0 -200px; animation-delay: 1.0s; }
    .d4 { top: 50%; left: 50%; margin: -280px 0 0 0px; animation-delay: 1.2s; }
    .d5 { top: 50%; left: 50%; margin: -240px 0 0 200px; animation-delay: 1.4s; }
    .d6 { top: 50%; left: 50%; margin: -130px 0 0 320px; animation-delay: 1.6s; }
    .d7 { top: 50%; left: 50%; margin: 20px 0 0 340px; animation-delay: 1.8s; }
    @keyframes domIn { to { opacity: 1; transform: scale(1); } }
    .lines-svg {
      position: absolute; left: 50%; top: 50%;
      width: 900px; height: 900px; transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .beam {
      stroke: url(#beamGrad); stroke-width: 1.5; fill: none;
      stroke-dasharray: 400; stroke-dashoffset: 400;
      animation: beamDraw 0.4s ease-out forwards;
    }
    .b1 { animation-delay: 0.7s; } .b2 { animation-delay: 0.9s; }
    .b3 { animation-delay: 1.1s; } .b4 { animation-delay: 1.3s; }
    .b5 { animation-delay: 1.5s; } .b6 { animation-delay: 1.7s; }
    .b7 { animation-delay: 1.9s; }
    @keyframes beamDraw { to { stroke-dashoffset: 0; } }
    .caption {
      position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%);
      font-size: 20px; font-weight: 600; letter-spacing: 3px; color: #94a3b8;
      opacity: 0; animation: capIn 0.6s ease-out 3s forwards;
    }
    @keyframes capIn { to { opacity: 1; } }
    .caption strong { color: #e2e8f0; }
  </style>
</head>
<body>
  <div class="stage">
    <div class="bg"></div>
    <div class="orbit-wrap">
      <div class="orbit">
        <svg class="lines-svg" viewBox="0 0 900 900">
          <defs>
            <linearGradient id="beamGrad" x1="450" y1="450" x2="0" y2="0">
              <stop stop-color="#38bdf8" stop-opacity="0.8"/>
              <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <line class="beam b1" x1="450" y1="450" x2="50" y2="450"/>
          <line class="beam b2" x1="450" y1="450" x2="110" y2="320"/>
          <line class="beam b3" x1="450" y1="450" x2="250" y2="210"/>
          <line class="beam b4" x1="450" y1="450" x2="450" y2="170"/>
          <line class="beam b5" x1="450" y1="450" x2="650" y2="210"/>
          <line class="beam b6" x1="450" y1="450" x2="770" y2="320"/>
          <line class="beam b7" x1="450" y1="450" x2="790" y2="470"/>
        </svg>
        <div class="core">
          <div class="t1">AI CORE</div>
          <div class="t2">BUEK CORE</div>
        </div>
        <div class="domain d1">🏭 Manufacturing</div>
        <div class="domain d2">🏥 Healthcare</div>
        <div class="domain d3">🏗️ Construction</div>
        <div class="domain d4">🛒 Retail</div>
        <div class="domain d5">⚡ Energy</div>
        <div class="domain d6">🚚 Logistics</div>
        <div class="domain d7">🎓 Education</div>
      </div>
    </div>
    <p class="caption"><strong>Manufacturing</strong> is just the beginning</p>
  </div>
</body>
</html>
