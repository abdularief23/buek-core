<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Scene 5.3 — Unlimited Industries</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1920px; height: 1080px; overflow: hidden;
      background: #020617;
      font-family: Inter, "SF Pro Display", system-ui, sans-serif;
      color: #f8fafc;
    }
    .stage {
      position: relative; width: 100%; height: 100%;
      animation: orbitZoom 5s ease-in-out forwards;
    }
    @keyframes orbitZoom {
      0% { transform: scale(1.15) rotate(0deg); }
      70% { transform: scale(1) rotate(2deg); }
      100% { transform: scale(0.95) rotate(0deg); }
    }
    .bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 50%, rgba(13, 79, 240, 0.18) 0%, transparent 65%),
        #020617;
    }
    .orbit-wrap {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .orbit {
      position: relative;
      width: 900px; height: 900px;
      animation: slowOrbit 5s linear infinite;
    }
    @keyframes slowOrbit {
      from { transform: rotate(0deg); }
      to { transform: rotate(12deg); }
    }
    .core-center {
      position: absolute; left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      padding: 24px 40px;
      border-radius: 18px;
      background: linear-gradient(135deg, #0d4ff0, #7a2af7);
      box-shadow: 0 0 50px rgba(13, 79, 240, 0.55);
      text-align: center;
      opacity: 0;
      animation: coreIn 0.6s ease-out 0.2s forwards;
    }
    @keyframes coreIn { to { opacity: 1; } }
    .core-center .t1 { font-size: 28px; font-weight: 900; letter-spacing: 2px; }
    .core-center .t2 { font-size: 13px; font-weight: 600; letter-spacing: 3px; color: #bfdbfe; margin-top: 2px; }
    .module {
      position: absolute;
      padding: 12px 16px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(56, 189, 248, 0.35);
      font-size: 14px; font-weight: 700;
      color: #e2e8f0;
      white-space: nowrap;
      opacity: 0;
      transform: scale(0.8);
      animation: modIn 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.15);
    }
    .module .ico { margin-right: 6px; }
    /* 8 modules on circle r=380 */
    .m1 { top: 50%; left: 50%; margin: -20px 0 0 -380px; animation-delay: 0.5s; }
    .m2 { top: 50%; left: 50%; margin: -120px 0 0 -320px; animation-delay: 0.7s; }
    .m3 { top: 50%; left: 50%; margin: -220px 0 0 -180px; animation-delay: 0.9s; }
    .m4 { top: 50%; left: 50%; margin: -260px 0 0 20px; animation-delay: 1.1s; }
    .m5 { top: 50%; left: 50%; margin: -220px 0 0 200px; animation-delay: 1.3s; }
    .m6 { top: 50%; left: 50%; margin: -120px 0 0 300px; animation-delay: 1.5s; }
    .m7 { top: 50%; left: 50%; margin: 20px 0 0 320px; animation-delay: 1.7s; }
    .m8 { top: 50%; left: 50%; margin: 140px 0 0 180px; animation-delay: 1.9s; }
    @keyframes modIn {
      to { opacity: 1; transform: scale(1); }
    }
    .lines-svg {
      position: absolute; left: 50%; top: 50%;
      width: 900px; height: 900px;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .beam {
      stroke: url(#beamGrad);
      stroke-width: 1.5;
      fill: none;
      opacity: 0.6;
      stroke-dasharray: 400;
      stroke-dashoffset: 400;
      animation: beamDraw 0.4s ease-out forwards;
    }
    .b1 { animation-delay: 0.6s; }
    .b2 { animation-delay: 0.8s; }
    .b3 { animation-delay: 1.0s; }
    .b4 { animation-delay: 1.2s; }
    .b5 { animation-delay: 1.4s; }
    .b6 { animation-delay: 1.6s; }
    .b7 { animation-delay: 1.8s; }
    .b8 { animation-delay: 2.0s; }
    @keyframes beamDraw { to { stroke-dashoffset: 0; } }
    .ecosystem { opacity: 1; animation: ecoFade 0.8s ease-in 3.8s forwards; }
    @keyframes ecoFade { to { opacity: 0; transform: scale(0.9); } }
    .finale {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      opacity: 0;
      animation: finaleIn 0.9s ease-out 4s forwards;
      z-index: 20;
    }
    @keyframes finaleIn { to { opacity: 1; } }
    .finale-glow {
      position: absolute; width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(13,79,240,0.4) 0%, transparent 70%);
    }
    .finale-logo { font-size: 72px; margin-bottom: 8px; filter: drop-shadow(0 0 24px rgba(56,189,248,0.6)); }
    .finale-text { font-size: 56px; font-weight: 900; letter-spacing: 6px; }
    .finale-text .c {
      background: linear-gradient(90deg, #38bdf8, #c4b5fd);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .finale-tag {
      margin-top: 28px; text-align: center;
      font-size: 22px; font-weight: 600; letter-spacing: 3px;
      color: #94a3b8; line-height: 1.6;
    }
    .finale-tag strong { color: #e2e8f0; font-weight: 700; }
  </style>
</head>
<body>
  <div class="stage">
    <div class="bg"></div>
    <div class="orbit-wrap ecosystem">
      <div class="orbit">
        <svg class="lines-svg" viewBox="0 0 900 900">
          <defs>
            <linearGradient id="beamGrad" x1="450" y1="450" x2="0" y2="0">
              <stop stop-color="#38bdf8" stop-opacity="0.8"/>
              <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <line class="beam b1" x1="450" y1="450" x2="70" y2="450"/>
          <line class="beam b2" x1="450" y1="450" x2="130" y2="330"/>
          <line class="beam b3" x1="450" y1="450" x2="270" y2="230"/>
          <line class="beam b4" x1="450" y1="450" x2="470" y2="190"/>
          <line class="beam b5" x1="450" y1="450" x2="650" y2="230"/>
          <line class="beam b6" x1="450" y1="450" x2="770" y2="330"/>
          <line class="beam b7" x1="450" y1="450" x2="770" y2="470"/>
          <line class="beam b8" x1="450" y1="450" x2="630" y2="590"/>
        </svg>
        <div class="core-center">
          <div class="t1">AI CORE</div>
          <div class="t2">BUEK CORE</div>
        </div>
        <div class="module m1"><span class="ico">🏭</span>Manufacturing</div>
        <div class="module m2"><span class="ico">🏥</span>Healthcare</div>
        <div class="module m3"><span class="ico">🏗️</span>Construction</div>
        <div class="module m4"><span class="ico">🛒</span>Retail</div>
        <div class="module m5"><span class="ico">⚡</span>Energy</div>
        <div class="module m6"><span class="ico">⛏️</span>Mining</div>
        <div class="module m7"><span class="ico">🎓</span>Education</div>
        <div class="module m8"><span class="ico">💰</span>Finance</div>
      </div>
    </div>
    <div class="finale">
      <div class="finale-glow"></div>
      <div class="finale-logo">⬡</div>
      <div class="finale-text">BUEK <span class="c">CORE</span></div>
      <p class="finale-tag">
        <strong>One AI Core.</strong><br />
        Unlimited Industry Knowledge.
      </p>
    </div>
  </div>
</body>
</html>
