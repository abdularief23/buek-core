<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>BUEK CORE — Scene 6 Platform Vision</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: #ffffff;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      color: #071341;
    }
    .stage {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .diagram {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 1100px;
    }
    .node {
      opacity: 0;
      transform: translateY(24px) scale(0.96);
      animation: nodeIn 0.65s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    .node-ai {
      animation-delay: 0s;
      width: 380px;
      padding: 28px 40px;
      border-radius: 20px;
      background: linear-gradient(135deg, #0d4ff0 0%, #5b2cf0 55%, #7a2af7 100%);
      color: #fff;
      font-size: 34px;
      font-weight: 800;
      letter-spacing: 2px;
      text-align: center;
      box-shadow: 0 18px 48px rgba(13, 79, 240, 0.28);
    }
    .node-ai .brand-core {
      background: linear-gradient(90deg, #a5f3fc, #e9d5ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .connector {
      width: 4px;
      height: 0;
      background: linear-gradient(180deg, #0d4ff0, #7a2af7);
      border-radius: 999px;
      animation: growDown 0.5s ease-out forwards;
    }
    .connector-1 { animation-delay: 0.8s; height: 72px; }
    .node-knowledge {
      animation-delay: 1.3s;
      width: 380px;
      padding: 26px 40px;
      border-radius: 18px;
      background: #fff;
      border: 3px solid #0d4ff0;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 4px;
      text-align: center;
      box-shadow: 0 12px 32px rgba(13, 79, 240, 0.1);
    }
    .branch-wrap {
      position: relative;
      width: 100%;
      height: 72px;
      flex-shrink: 0;
    }
    .branch-svg {
      display: block;
      width: 100%;
      height: 72px;
      overflow: visible;
    }
    .branch-line {
      fill: none;
      stroke: url(#lineGrad);
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 1200;
      stroke-dashoffset: 1200;
      animation: drawBranch 0.7s ease-out forwards;
      animation-delay: 2.1s;
    }
    .industries {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 28px;
      width: 100%;
      margin-top: 0;
    }
    .industry {
      opacity: 0;
      transform: translateY(20px);
      animation: nodeIn 0.55s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      padding: 22px 16px;
      border-radius: 16px;
      background: #f8faff;
      border: 2px solid rgba(13, 79, 240, 0.18);
      text-align: center;
      font-size: 19px;
      font-weight: 700;
      line-height: 1.35;
      letter-spacing: 0.5px;
      color: #162044;
      box-shadow: 0 8px 24px rgba(13, 79, 240, 0.06);
    }
    .industry .icon {
      display: block;
      font-size: 32px;
      margin-bottom: 10px;
    }
    .industry-1 { animation-delay: 2.9s; }
    .industry-2 { animation-delay: 3.7s; }
    .industry-3 { animation-delay: 4.5s; }
    .industry-4 { animation-delay: 5.3s; }
    .subtitle {
      margin-top: 48px;
      opacity: 0;
      animation: fadeIn 0.6s ease-out 6.2s forwards;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 3px;
      color: #4a5580;
      text-align: center;
    }
    @keyframes nodeIn {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes growDown {
      from { height: 0; opacity: 0; }
      to { height: 72px; opacity: 1; }
    }
    @keyframes drawBranch {
      to { stroke-dashoffset: 0; }
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="diagram">
      <div class="node node-ai">Buek <span class="brand-core">Core</span></div>
      <div class="connector connector-1"></div>
      <div class="node node-knowledge">Knowledge</div>
      <div class="branch-wrap">
        <svg class="branch-svg" viewBox="0 0 1100 72" fill="none" aria-hidden="true">
          <defs>
            <linearGradient id="lineGrad" x1="550" y1="0" x2="550" y2="72" gradientUnits="userSpaceOnUse">
              <stop stop-color="#0d4ff0"/>
              <stop offset="1" stop-color="#7a2af7"/>
            </linearGradient>
          </defs>
          <!-- trunk: Knowledge → horizontal bar -->
          <path class="branch-line" d="M550 0 L550 28" />
          <!-- horizontal bar spanning all four columns -->
          <path class="branch-line" d="M127 28 L973 28" />
          <!-- vertical drops to each industry card (centers: 12.5%, 37.5%, 62.5%, 87.5%) -->
          <path class="branch-line" d="M127 28 L127 72" />
          <path class="branch-line" d="M409 28 L409 72" />
          <path class="branch-line" d="M691 28 L691 72" />
          <path class="branch-line" d="M973 28 L973 72" />
        </svg>
      </div>
      <div class="industries">
        <div class="industry industry-1"><span class="icon">🏭</span>Manufacturing</div>
        <div class="industry industry-2"><span class="icon">🏥</span>Healthcare</div>
        <div class="industry industry-3"><span class="icon">🏗️</span>Construction</div>
        <div class="industry industry-4"><span class="icon">🛒</span>Retail</div>
      </div>
      <p class="subtitle">One Buek Core reasoning engine · Unlimited domain knowledge</p>
    </div>
  </div>
</body>
</html>
